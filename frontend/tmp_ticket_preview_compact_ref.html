<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Лист талонов на питание</title>
    <style>
        body { font-family: "Segoe UI", Arial, sans-serif; margin: 10px; color: #111827; }
        .report-header { margin-bottom: 8px; }
        .report-header h1 { margin: 0 0 4px; font-size: 20px; }
        .report-header p { margin: 0; font-size: 13px; }
        .report-header.report-header-compact { margin-bottom: 1px; }
        .report-header.report-header-compact h1 { margin: 0; font-size: 10px; line-height: 1.1; font-weight: 700; }
        .doc-title { text-align: center; font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .doc-subtitle, .doc-org { text-align: center; margin-bottom: 6px; }
        .doc-inline-meta { display: flex; justify-content: space-between; gap: 12px; margin: 8px 0; font-size: 12px; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 14px; }
        .report-table th, .report-table td { border: 1px solid #111827; padding: 6px; font-size: 13px; vertical-align: top; }
        .report-table-wide th, .report-table-wide td { padding: 4px; font-size: 11px; }
        .student-col { min-width: 180px; }
        .day-col, .day-cell, .day-total { width: 26px; text-align: center; }
        .day-cell { font-weight: 700; line-height: 1.1; }
        .totals-row td, .grand-total td { font-weight: 700; }
        .report-footer { margin-top: 20px; }
        .totals { margin-top: 10px; font-weight: 700; }
        .signatures { display: flex; flex-direction: column; gap: 12px; margin-top: 18px; }
        .signature-line { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }

        .ticket-sheet-meta {
          display: flex;
          justify-content: space-between;
          align-items: center;
          gap: 8px;
          margin: 0;
          font-size: 7.4px;
          line-height: 1.2;
          color: #334155;
        }
        .ticket-sheet-meta span:last-child { white-space: nowrap; }
        .ticket-print-grid {
          display: grid;
          gap: 0;
          margin-top: 0;
          align-items: start;
        }
        .ticket-print-grid + .ticket-print-grid { margin-top: 0; }
        .ticket-print-grid-triple { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .ticket-print-grid-single { grid-template-columns: repeat(4, minmax(0, 1fr)); }

        .ticket-print-card {
          border: 0.22px dashed #94a3b8;
          padding: 0.62mm 0.72mm 0.52mm;
          break-inside: avoid;
          page-break-inside: avoid;
          -webkit-column-break-inside: avoid;
          box-sizing: border-box;
          margin: 0;
          background: #fff;
          overflow: hidden;
          min-height: 0;
        }

        .ticket-print-meta-block {
          display: grid;
          gap: 0.24mm;
          margin-bottom: 0.2mm;
        }
        .ticket-print-meta-block-compact { gap: 0.22mm; }
        .ticket-print-student {
          margin: 0;
          font-size: 8px;
          font-weight: 700;
          line-height: 1.2;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .ticket-print-submeta {
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          gap: 0.4mm;
          align-items: baseline;
          font-size: 6.15px;
          line-height: 1.15;
          color: #475569;
        }
        .ticket-print-submeta-group {
          min-width: 0;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .ticket-print-submeta-period {
          white-space: nowrap;
          text-align: right;
        }

        .ticket-print-card-single-main {
          display: grid;
          gap: 0.2mm;
          padding-top: 0.1mm;
        }
        .ticket-print-card-single-head {
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          gap: 0.5mm;
          align-items: baseline;
        }
        .ticket-print-card-single-title {
          font-size: 7px;
          font-weight: 700;
          line-height: 1.15;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .ticket-print-card-single-meal {
          font-size: 6.05px;
          line-height: 1.15;
          color: #475569;
          white-space: nowrap;
        }

        .ticket-print-card-triple {
          display: grid;
          gap: 0.35mm;
        }
        .ticket-print-card-triple .ticket-print-meta-block {
          margin: 0;
          min-width: 0;
          padding-bottom: 0.2mm;
          border-bottom: 0.2px solid #e2e8f0;
        }

        .ticket-print-triple-primary {
          display: grid;
          gap: 0.2mm;
          align-items: stretch;
        }

        .ticket-print-codes {
          display: grid;
          gap: 0.26mm;
        }
        .ticket-print-triple-secondary {
          grid-template-columns: 1fr 1fr;
          column-gap: 0.38mm;
          row-gap: 0.26mm;
          align-items: start;
          padding-top: 0.22mm;
          border-top: 0.2px solid #e2e8f0;
        }

        .ticket-code-slot {
          display: grid;
          gap: 0.12mm;
          min-width: 0;
        }
        .ticket-code-slot-head {
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          gap: 0.5mm;
          align-items: baseline;
        }
        .ticket-code-slot-label {
          font-size: 6.45px;
          font-weight: 700;
          line-height: 1.15;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .ticket-code-slot-primary .ticket-code-slot-label {
          font-weight: 800;
          display: inline-flex;
          align-items: center;
          width: fit-content;
          padding: 0 0.55mm;
          border-radius: 2.1mm;
          background: #f1e4ad;
          color: #111827;
        }
        .ticket-code-slot-meal {
          font-size: 5.85px;
          line-height: 1.15;
          color: #475569;
          white-space: nowrap;
        }
        .ticket-code-slot-body {
          display: grid;
          gap: 0;
          min-width: 0;
        }

        .ticket-print-barcode-wrap {
          display: grid;
          gap: 0;
          width: 100%;
          min-width: 0;
        }
        .ticket-print-barcode { width: 100%; }
        .ticket-print-barcode svg {
          width: 100%;
          height: 8.25mm;
          display: block;
        }
        .ticket-print-barcode-single svg { height: 8.55mm; }
        .ticket-print-triple-primary-main .ticket-print-barcode svg { height: 8.65mm; }
        .ticket-print-triple-secondary .ticket-print-barcode svg { height: 7.45mm; }

        @media print {
          @page { size: A4 portrait; margin: 2.5mm; }
          body { margin: 0; }
          .report-header { margin-bottom: 4px; }
          .report-header h1 { font-size: 16px; margin-bottom: 2px; }
          .report-header p { font-size: 11px; }

          .ticket-sheet-print .report-header { margin-bottom: 0.6mm; }
          .ticket-sheet-print .report-header h1 { font-size: 8.3px; margin-bottom: 0; line-height: 1.1; }
          .ticket-sheet-meta { font-size: 6.9px; margin: 0; }
          .ticket-print-grid { gap: 0; }
          .ticket-print-grid-triple { grid-template-columns: repeat(2, minmax(0, 1fr)); }
          .ticket-print-grid-single { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        }
    </style>
  </head>
